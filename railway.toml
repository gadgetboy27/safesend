[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile --ignore-scripts && pnpm --filter @workspace/safesend run build && cd artifacts/api-server && node build.mjs"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
