kind = "web"
previewPath = "/"
title = "SafeSend — Marketplace Escrow"
version = "1.0.0"
id = "artifacts/safesend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22104

[services.development]
run = "pnpm --filter @workspace/safesend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safesend", "run", "build" ]
publicDir = "artifacts/safesend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22104"
BASE_PATH = "/"
